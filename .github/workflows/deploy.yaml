name: Build and deploy MarbleBlast to GitHub Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Install deps; upstream suggests --legacy-peer-deps
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --legacy-peer-deps

      # Compile TS bundles (Rollup)
      - name: Compile
        run: npm run compile

      # Create production bundle in dist/ (Sarcina)
      - name: Bundle for production
        run: npm run bundle

      # Configure GitHub Pages (enables Pages and exposes base_path, base_url, etc.)
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # Prevent Jekyll processing
      - name: Add .nojekyll
        run: touch dist/.nojekyll

      # If your site is served under /<repo>/, add a <base> so relative URLs resolve.
      # configure-pages exposes the base_path; inject it if needed.
      - name: Inject <base href> for subpath hosting
        shell: bash
        run: |
          BASE_PATH="${{ steps.pages.outputs.base_path }}"
          if [ -n "$BASE_PATH" ] && [ "$BASE_PATH" != "/" ] && [ -f dist/index.html ]; then
            # ensure trailing slash
            BASE_PATH="${BASE_PATH%/}/"
            sed -i 's#<head>#<head><base href="'"$BASE_PATH"'">#' dist/index.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          # retention-days: 1   # (optional) keep artifact briefly

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
