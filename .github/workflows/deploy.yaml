name: Deploy MarbleBlast Web

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 1) Opt-in to Node.js 24 NOW (future-proof)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 2) (Optional Safety Switch)  
# If GitHub breaks something AFTER June 2, 2026,  
# uncomment this line temporarily to keep Node 20:
# ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Updated to newest GitHub-supported versions (Node 24-ready)
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24   # Explicit Node 24 target

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ./dist
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
